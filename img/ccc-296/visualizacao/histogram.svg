<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Exemplo de histograma">
  <rect width="100%" height="100%" fill="white"/>
  <!-- axes -->
  <line x1="110" y1="380" x2="820" y2="380" stroke="#111" stroke-width="3"/>
  <line x1="110" y1="380" x2="110" y2="90" stroke="#111" stroke-width="3"/>

  <!-- bins -->
  <rect x="160" y="330" width="70" height="50" fill="#9aa0a6"/>
  <rect x="235" y="290" width="70" height="90" fill="#9aa0a6"/>
  <rect x="310" y="230" width="70" height="150" fill="#9aa0a6"/>
  <rect x="385" y="170" width="70" height="210" fill="#9aa0a6"/>
  <rect x="460" y="200" width="70" height="180" fill="#9aa0a6"/>
  <rect x="535" y="260" width="70" height="120" fill="#9aa0a6"/>
  <rect x="610" y="310" width="70" height="70" fill="#9aa0a6"/>

  <!-- labels -->
  <text x="110" y="430" font-family="Roboto, Arial" font-size="22" fill="#111">Valores (intervalos)</text>
  <text x="20" y="170" font-family="Roboto, Arial" font-size="22" fill="#111" transform="rotate(-90 20,170)">Frequência</text>
</svg>
