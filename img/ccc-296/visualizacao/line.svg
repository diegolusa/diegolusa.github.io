<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Exemplo de gráfico de linhas (série temporal)">
  <rect width="100%" height="100%" fill="white"/>
  <!-- axes -->
  <line x1="110" y1="380" x2="820" y2="380" stroke="#111" stroke-width="3"/>
  <line x1="110" y1="380" x2="110" y2="90" stroke="#111" stroke-width="3"/>

  <!-- line -->
  <polyline points="140,330 230,300 320,320 410,260 500,240 590,210 680,230 770,170"
            fill="none" stroke="#9aa0a6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- points -->
  <g fill="#111">
    <circle cx="140" cy="330" r="6"/>
    <circle cx="230" cy="300" r="6"/>
    <circle cx="320" cy="320" r="6"/>
    <circle cx="410" cy="260" r="6"/>
    <circle cx="500" cy="240" r="6"/>
    <circle cx="590" cy="210" r="6"/>
    <circle cx="680" cy="230" r="6"/>
    <circle cx="770" cy="170" r="6"/>
  </g>

  <!-- labels -->
  <text x="110" y="430" font-family="Roboto, Arial" font-size="22" fill="#111">Tempo</text>
  <text x="20" y="110" font-family="Roboto, Arial" font-size="22" fill="#111" transform="rotate(-90 20,110)">Valor</text>
</svg>
