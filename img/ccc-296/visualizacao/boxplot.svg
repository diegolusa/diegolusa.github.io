<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Exemplo de boxplot">
  <rect width="100%" height="100%" fill="white"/>
  <!-- axes -->
  <line x1="110" y1="380" x2="820" y2="380" stroke="#111" stroke-width="3"/>
  <line x1="110" y1="380" x2="110" y2="90" stroke="#111" stroke-width="3"/>

  <!-- boxplot (vertical) -->
  <!-- whiskers -->
  <line x1="465" y1="120" x2="465" y2="330" stroke="#111" stroke-width="4"/>
  <line x1="410" y1="120" x2="520" y2="120" stroke="#111" stroke-width="4"/>
  <line x1="410" y1="330" x2="520" y2="330" stroke="#111" stroke-width="4"/>

  <!-- box -->
  <rect x="395" y="190" width="140" height="120" fill="#9aa0a6" stroke="#111" stroke-width="4"/>

  <!-- median -->
  <line x1="395" y1="250" x2="535" y2="250" stroke="#111" stroke-width="5"/>

  <!-- outlier -->
  <circle cx="600" cy="150" r="7" fill="#9aa0a6" stroke="#111" stroke-width="2"/>

  <!-- labels -->
  <text x="110" y="430" font-family="Roboto, Arial" font-size="22" fill="#111">Grupo</text>
  <text x="20" y="170" font-family="Roboto, Arial" font-size="22" fill="#111" transform="rotate(-90 20,170)">Valores</text>
  <text x="440" y="410" font-family="Roboto, Arial" font-size="18" fill="#111">A</text>
</svg>
