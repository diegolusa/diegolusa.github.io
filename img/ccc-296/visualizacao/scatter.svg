<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Exemplo de gráfico de dispersão">
  <rect width="100%" height="100%" fill="white"/>
  <!-- axes -->
  <line x1="110" y1="380" x2="820" y2="380" stroke="#111" stroke-width="3"/>
  <line x1="110" y1="380" x2="110" y2="90" stroke="#111" stroke-width="3"/>

  <!-- points -->
  <g fill="#9aa0a6" stroke="#111" stroke-width="1">
    <circle cx="170" cy="330" r="8"/>
    <circle cx="230" cy="310" r="8"/>
    <circle cx="280" cy="300" r="8"/>
    <circle cx="340" cy="270" r="8"/>
    <circle cx="390" cy="260" r="8"/>
    <circle cx="450" cy="235" r="8"/>
    <circle cx="520" cy="220" r="8"/>
    <circle cx="600" cy="205" r="8"/>
    <circle cx="690" cy="180" r="8"/>
    <circle cx="760" cy="165" r="8"/>
  </g>

  <!-- labels -->
  <text x="110" y="430" font-family="Roboto, Arial" font-size="22" fill="#111">Variável X</text>
  <text x="20" y="150" font-family="Roboto, Arial" font-size="22" fill="#111" transform="rotate(-90 20,150)">Variável Y</text>
</svg>
